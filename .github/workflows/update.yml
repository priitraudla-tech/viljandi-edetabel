name: Uuenda edetabel

on:
  schedule:
    # Iga päev kell 04:00 UTC (06:00–07:00 Eesti aeg, sõltuvalt suvi-/talveajast)
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch & parse Google Sheet
        run: python scripts/fetch.py

      - name: Commit changes
        run: |
          git config user.name "edetabel-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: $(date -u +%Y-%m-%d) snapshot"
            git push
          fi
