# Netlify build configuration.
# Saidil on staatilised failid + JSON andmed — build pole vajalik.

[build]
  publish = "."
  command = ""

# Üleminekuperiood: frontend kasutab /api/* teid (Cloudflare Pages vorming);
# see redirect hoiab vana Netlify saidi töökorras kuni migratsioon on tehtud.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=60"
