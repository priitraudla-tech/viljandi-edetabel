name: Uuenda edetabel

on:
  schedule:
    # Iga laupäeva õhtu, iga tund 18:00-24:00 EEST (= 15:00-21:00 UTC suvel).
    # Talveajal (EET, UTC+2) jookseb 17:00-23:00 — ikka õhtu, sobib turniiriõhtuks.
    # 6 = laupäev (cron: 0=pühapäev, 1=esmaspäev, ..., 6=laupäev).
    - cron: "0 15-21 * * 6"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  # Use Node.js 24 runtime for actions (silences deprecation warning).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch & parse Google Sheet
        run: python scripts/fetch.py

      - name: Commit changes
        run: |
          git config user.name "edetabel-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: $(date -u +%Y-%m-%d) snapshot"
            git push
          fi
